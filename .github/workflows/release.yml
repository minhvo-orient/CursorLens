name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm run test

  build:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            build_script: npm run build:mac
            artifact_name: macos-installers
          - os: windows-latest
            build_script: npm run build:win
            artifact_name: windows-installers
          - os: ubuntu-latest
            build_script: npm run build:linux
            artifact_name: linux-installers

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install app dependencies
        run: npx electron-builder install-app-deps

      - name: Build app
        run: ${{ matrix.build_script }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Collect and create -latest copies
        shell: bash
        run: |
          mkdir -p dist-release

          # Collect only the real installer files (skip junk like elevate.exe, CursorLens.exe, blockmaps, yml)
          for f in $(find release -type f \( -name '*.dmg' -o -name '*.AppImage' \)); do
            cp "$f" dist-release/
          done
          # For Windows, only pick the NSIS Setup installer (dash-separated name)
          for f in $(find release -type f -name 'CursorLens-Setup-*.exe'); do
            cp "$f" dist-release/
          done

          # Create -latest copies
          for f in dist-release/*; do
            base=$(basename "$f")
            latest=$(echo "$base" | sed -E 's/[.-][0-9]+\.[0-9]+\.[0-9]+/-latest/g')
            if [ "$base" != "$latest" ] && [ ! -f "dist-release/$latest" ]; then
              cp "$f" "dist-release/$latest"
              echo "Created: $latest"
            fi
          done

          echo "--- Final artifacts ---"
          ls -lh dist-release/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist-release/*
          if-no-files-found: error
          retention-days: 30

  publish-release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.exe
            artifacts/**/*.AppImage
